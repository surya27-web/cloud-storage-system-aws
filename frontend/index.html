<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Storage System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:50px;
color:white;
}

.container{
background:white;
color:#333;
padding:40px;
border-radius:12px;
width:520px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
margin-bottom:10px;
color:#2c5364;
}

.subtitle{
margin-bottom:25px;
font-size:14px;
color:#777;
}

.upload-box{
border:2px dashed #2c5364;
padding:30px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
background:#f4f7fb;
}

.upload-box.dragover{
background:#e8f0ff;
border-color:#0077ff;
}

.upload-icon{
font-size:40px;
margin-bottom:10px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#2c5364;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1c3a47;
}

.status{
margin-top:20px;
font-size:14px;
color:#555;
word-break:break-all;
}

.search{
margin-top:20px;
padding:10px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

.progress{
width:100%;
background:#ddd;
border-radius:6px;
overflow:hidden;
margin-top:10px;
display:none;
}

.progress-bar{
height:10px;
background:#2c5364;
width:0%;
}

.file-section{
margin-top:30px;
text-align:left;
}

.file{
padding:10px;
border-bottom:1px solid #ddd;
}

.file-top{
display:flex;
justify-content:space-between;
}

.file-meta{
font-size:12px;
color:#666;
}

.file button{
padding:4px 8px;
font-size:12px;
margin-left:6px;
}

footer{
margin-top:25px;
font-size:12px;
color:#999;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>☁ Cloud Storage</h1>
<p class="subtitle">Secure File Upload System</p>

<div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
<div class="upload-icon">📁</div>
<p>Click or Drag a file here</p>
<input type="file" id="fileInput" hidden>
</div>

<button onclick="uploadFile()">Upload File</button>

<p class="status" id="status"></p>

<div class="progress" id="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<input class="search" id="search" placeholder="Search files..." oninput="filterFiles()">

<div class="file-section">
<h3>Stored Files</h3>
<div id="files">Loading files...</div>
</div>

<footer>
Cloud Internship Project
</footer>

</div>

<script>

const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");

uploadBox.addEventListener("dragover",(e)=>{
e.preventDefault();
uploadBox.classList.add("dragover");
});

uploadBox.addEventListener("dragleave",()=>{
uploadBox.classList.remove("dragover");
});

uploadBox.addEventListener("drop",(e)=>{
e.preventDefault();
uploadBox.classList.remove("dragover");

const files = e.dataTransfer.files;

if(files.length > 0){
fileInput.files = files;
uploadFile();
}

});


function getFileIcon(name){

const ext = name.split(".").pop().toLowerCase();

if(ext==="jpg"||ext==="jpeg"||ext==="png"||ext==="gif") return "🖼";
if(ext==="pdf") return "📄";
if(ext==="doc"||ext==="docx") return "📝";
if(ext==="txt") return "📄";
if(ext==="zip"||ext==="rar") return "📦";
if(ext==="mp4"||ext==="mov") return "🎬";
if(ext==="mp3") return "🎵";

return "📁";

}

function formatSize(bytes){
if(bytes < 1024) return bytes + " B";
if(bytes < 1048576) return (bytes/1024).toFixed(1)+" KB";
return (bytes/1048576).toFixed(1)+" MB";
}

function formatDate(date){
return new Date(date).toLocaleDateString();
}

function uploadFile(){

const file=fileInput.files[0];

if(!file){
document.getElementById("status").innerText="Please select a file first.";
return;
}

const formData=new FormData();
formData.append("file",file);

const xhr=new XMLHttpRequest();

progress.style.display="block";
progressBar.style.width="0%";

xhr.upload.addEventListener("progress",(e)=>{

if(e.lengthComputable){

const percent=(e.loaded/e.total)*100;
progressBar.style.width=percent+"%";

}

});

xhr.onload=()=>{
const data=JSON.parse(xhr.responseText);

document.getElementById("status").innerHTML=
"Upload successful <br><a href='"+data.url+"' target='_blank'>Open File</a>";

progress.style.display="none";
loadFiles();

};

xhr.open("POST","http://localhost:3000/upload");
xhr.send(formData);

}


let allFiles=[];

async function loadFiles(){

const response=await fetch("http://localhost:3000/files");
allFiles=await response.json();

displayFiles(allFiles);

}

function displayFiles(files){

const container=document.getElementById("files");
container.innerHTML="";

files.forEach(file=>{

container.innerHTML+=`
<div class="file">
<div class="file-top">
<span>${getFileIcon(file.name)} ${file.name}</span>
<div>
<a href="${file.url}" target="_blank">Download</a>
<button onclick="deleteFile('${file.name}')">Delete</button>
</div>
</div>
<div class="file-meta">
Size: ${formatSize(file.size)} | Uploaded: ${formatDate(file.date)}
</div>
</div>
`;

});

}

function filterFiles(){

const term=document.getElementById("search").value.toLowerCase();

const filtered=allFiles.filter(f=>f.name.toLowerCase().includes(term));

displayFiles(filtered);

}

async function deleteFile(name){

await fetch("http://localhost:3000/delete/"+name,{
method:"DELETE"
});

loadFiles();

}

loadFiles();

</script>

</body>
</html>
